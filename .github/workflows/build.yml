name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -offmpeg_tmp
          $ffdir = Get-ChildItem -Path ffmpeg_tmp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path "bin/ffmpeg" -Force
          Move-Item "$($ffdir.FullName)/bin" "bin/ffmpeg/bin"
          Remove-Item -Recurse ffmpeg_tmp
        shell: pwsh

      - name: Download N_m3u8DL-RE
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases/latest"
          $asset = $releases.assets | Where-Object { $_.name -match "win-x64" -and $_.name -match "\.exe$" } | Select-Object -First 1
          if ($asset) {
            curl -L -o bin/N_m3u8DL-RE.exe $asset.browser_download_url
          } else {
            curl -L -o bin/N_m3u8DL-RE.exe "https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.3.1-beta/N_m3u8DL-RE_Beta_win-x64.exe"
          }
        shell: pwsh

      - name: Build EXE
        run: pyinstaller main.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dobroLoader
          path: dist/dobroLoader.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dobroLoader.exe
